<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito - ComprasFlash</title>

<style>

.navbar{
    background:#222;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.navbar a:hover{
    color:#ff6b00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#1b1b1b;
    padding:20px;
    border-bottom:2px solid #ff6b00;
}

header h1{
    color:#ff6b00;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.producto{
    background:#1b1b1b;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
}

button{
    background:#ff6b00;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#ff8533;
}

.total{
    font-size:24px;
    margin-top:20px;
    color:#ff6b00;
}

.realizar{
    margin-top:20px;
    font-size:18px;
}

</style>
</head>

<body>

<header>

    <nav class="navbar">

<a href="perfil.html">👤 Perfil</a>

<a href="catalogo.html">🛍️ Catálogo</a>

<a href="carrito.html">🛒 Carrito</a>

<a href="rastreo.html">🚚 Rastreo</a>

</nav>

<h1>🛒 Mi Carrito</h1>
</header>

<div class="container">

<div id="listaCarrito"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button class="realizar" onclick="realizarPedido()">
Realizar Pedido
</button>

</div>

<script>

let carrito =
JSON.parse(localStorage.getItem("carrito")) || [];

let contenedor =
document.getElementById("listaCarrito");

let total = 0;

function mostrarCarrito(){

    contenedor.innerHTML = "";
    total = 0;

    carrito.forEach((producto,index)=>{

        total += Number(producto.precio);

        contenedor.innerHTML += `
        <div class="producto">

            <h2>${producto.nombre}</h2>

            <p>${producto.descripcion}</p>

            <p><strong>$${producto.precio}</strong></p>

            <button onclick="eliminar(${index})">
            Eliminar
            </button>

        </div>
        `;
    });

    document.getElementById("total")
    .textContent = total;
}

function eliminar(index){

    carrito.splice(index,1);

    localStorage.setItem(
        "carrito",
        JSON.stringify(carrito)
    );

    mostrarCarrito();
}

function realizarPedido(){

    if(carrito.length === 0){

        alert("El carrito está vacío");
        return;
    }

    let pedidos =
    JSON.parse(localStorage.getItem("pedidos")) || [];

    let guia =
    "CF-2026-" +
    String(pedidos.length + 1)
    .padStart(6,"0");

    let usuario =
    JSON.parse(
        localStorage.getItem("usuarioActual")
    );

    pedidos.push({

        guia: guia,

        usuario: usuario.correo,

        productos: carrito,

        total: total,

        estado: "Preparando envío"

    });

    localStorage.setItem(
        "pedidos",
        JSON.stringify(pedidos)
    );

    localStorage.removeItem("carrito");

    alert(
        "Pedido realizado.\nGuía: " + guia
    );

    location.reload();
}

mostrarCarrito();

</script>

</body>
</html>
