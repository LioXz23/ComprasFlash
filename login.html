<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión - ComprasFlash</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1b1b1b;
    padding:40px;
    border-radius:15px;
    width:400px;
    box-shadow:0 0 20px rgba(255,107,0,.3);
}

h1{
    text-align:center;
    color:#ff6b00;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#ff8533;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#ff6b00;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Iniciar Sesión</h1>

<input
type="email"
id="correo"
placeholder="Correo electrónico">

<input
type="password"
id="password"
placeholder="Contraseña">

<button onclick="login()">
Ingresar
</button>

<p>
¿No tienes cuenta?
<a href="registro.html">Regístrate</a>
</p>

</div>

<script>

function login(){

    let correo =
    document.getElementById("correo").value;

    let password =
    document.getElementById("password").value;

    let usuarios =
    JSON.parse(localStorage.getItem("usuarios")) || [];

    let usuario =
    usuarios.find(
        u =>
        u.correo === correo &&
        u.password === password
    );

    if(!usuario){
        alert("Correo o contraseña incorrectos");
        return;
    }

    localStorage.setItem(
        "usuarioActual",
        JSON.stringify(usuario)
    );

    alert(
        "Bienvenido " + usuario.nombre
    );

  if(usuario.rol === "admin"){

    window.location.href =
    "admin.html";

}else{

    window.location.href =
    "perfil.html";
}
}

</script>

</body>
</html>
