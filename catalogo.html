<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo - ComprasFlash</title>

<style>

.navbar{
    background:#222;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.navbar a:hover{
    color:#ff6b00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#1b1b1b;
    padding:20px;
    border-bottom:2px solid #ff6b00;
}

header h1{
    color:#ff6b00;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1b1b1b;
    border-radius:12px;
    overflow:hidden;
    padding:15px;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin-top:10px;
    color:#ff6b00;
}

.card p{
    margin-top:10px;
}

button{
    margin-top:15px;
    width:100%;
    padding:10px;
    background:#ff6b00;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#ff8533;
}

</style>
</head>

<body>

<header>

    <nav class="navbar">

<a href="perfil.html">👤 Perfil</a>

<a href="catalogo.html">🛍️ Catálogo</a>

<a href="carrito.html">🛒 Carrito</a>

<a href="rastreo.html">🚚 Rastreo</a>

</nav>

<h1>🛍️ Catálogo ComprasFlash</h1>
</header>

<div class="container">

<div class="grid" id="catalogo"></div>

</div>

<script>

let productos =
JSON.parse(localStorage.getItem("productos")) || [];

if(productos.length === 0){

    productos = [

        {
            nombre:"Laptop Gamer",
            precio:"24999",
            descripcion:"Laptop gamer de alto rendimiento con procesador de última generación, 16 GB de RAM y tarjeta gráfica dedicada.",
            imagen:"Productos/laptop_gamer.png"
        },

        {
            nombre:"Mouse Gamer",
            precio:"799",
            descripcion:"Mouse gamer ergonómico con iluminación RGB y alta precisión.",
            imagen:"Productos/mouse_gamer.png"
        },

        {
            nombre:"Teclado Gamer",
            precio:"1299",
            descripcion:"Teclado mecánico gamer con retroiluminación RGB.",
            imagen:"Productos/teclado_gamer.png"
        },

        {
            nombre:"Silla Gamer",
            precio:"3499",
            descripcion:"Silla gamer ergonómica con soporte lumbar y reposabrazos ajustables.",
            imagen:"Productos/silla_gamer.png"
        }

    ];

}

let catalogo =
document.getElementById("catalogo");

productos.forEach((producto,index)=>{

    catalogo.innerHTML += `

    <div class="card">

        <img src="${producto.imagen}">

        <h3>${producto.nombre}</h3>

        <p>${producto.descripcion}</p>

        <p><strong>$${producto.precio}</strong></p>

        <button onclick="agregarCarrito(${index})">
        Agregar al carrito
        </button>

    </div>

    `;
});



function agregarCarrito(index){

    let productos =
    JSON.parse(localStorage.getItem("productos")) || [];

    if(productos.length === 0){

        productos = [

            {
                nombre:"Laptop Gamer",
                precio:"24999",
                descripcion:"Laptop gamer de alto rendimiento con procesador de última generación, 16 GB de RAM y tarjeta gráfica dedicada.",
                imagen:"Productos/laptop_gamer.png"
            },

            {
                nombre:"Mouse Gamer",
                precio:"799",
                descripcion:"Mouse gamer ergonómico con iluminación RGB y alta precisión.",
                imagen:"Productos/mouse_gamer.png"
            },

            {
                nombre:"Teclado Gamer",
                precio:"1299",
                descripcion:"Teclado mecánico gamer con retroiluminación RGB.",
                imagen:"Productos/teclado_gamer.png"
            },

            {
                nombre:"Silla Gamer",
                precio:"3499",
                descripcion:"Silla gamer ergonómica con soporte lumbar y reposabrazos ajustables.",
                imagen:"Productos/silla_gamer.png"
            }

        ];

    }

    let carrito =
    JSON.parse(localStorage.getItem("carrito")) || [];

    carrito.push(productos[index]);

    localStorage.setItem(
        "carrito",
        JSON.stringify(carrito)
    );

    alert("Producto agregado al carrito");
}

</script>

</body>
</html>
