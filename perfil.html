<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Perfil - ComprasFlash</title>

<style>

.navbar{
    background:#222;
    padding:15px;
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.navbar a:hover{
    color:#ff6b00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#1b1b1b;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #ff6b00;
}

.logo{
    color:#ff6b00;
    font-size:28px;
    font-weight:bold;
}

button{
    background:#ff6b00;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:#1b1b1b;
    padding:30px;
    border-radius:15px;
}

h1{
    color:#ff6b00;
    margin-bottom:20px;
}

.info{
    margin-top:15px;
    font-size:18px;
}

.menu{
    margin-top:30px;
}

.card{
    background:#262626;
    padding:20px;
    margin-top:15px;
    border-radius:10px;
}

.card a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

</style>
</head>

<body>

<header>

    <nav class="navbar">

<a href="perfil.html">👤 Perfil</a>

<a href="catalogo.html">🛍️ Catálogo</a>

<a href="carrito.html">🛒 Carrito</a>

<a href="rastreo.html">🚚 Rastreo</a>

</nav>

<div class="logo">
🔥 ComprasFlash
</div>

<button onclick="cerrarSesion()">
Cerrar Sesión
</button>

</header>

<div class="container">

<h1>Mi Perfil</h1>

<div class="info">
<strong>Nombre:</strong>
<span id="nombre"></span>
</div>

<div class="info">
<strong>Apellido:</strong>
<span id="apellido"></span>
</div>

<div class="info">
<strong>Correo:</strong>
<span id="correo"></span>
</div>

<div class="menu">

<div class="card">
<a href="catalogo.html">🛍️ Catálogo de Productos</a>
</div>

<div class="card">
<a href="carrito.html">🛒 Mi Carrito</a>
</div>

<div class="card">
<a href="#">📦 Mis Pedidos</a>
</div>

<div class="card">
<a href="rastreo.html">🚚 Rastrear Paquete</a>
</div>

</div>

</div>

<script>

let usuario =
JSON.parse(
localStorage.getItem("usuarioActual")
);

if(!usuario){

    window.location.href = "index.html";
}

document.getElementById("nombre")
.textContent = usuario.nombre;

document.getElementById("apellido")
.textContent = usuario.apellido;

document.getElementById("correo")
.textContent = usuario.correo;

function cerrarSesion(){

    localStorage.removeItem(
        "usuarioActual"
    );

    window.location.href =
"index.html";
}

</script>

</body>
</html>
